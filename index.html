<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Black History Word Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4A017;
    --orange: #E8760A;
    --light-gold: #F0C040;
    --cream: #F5EDD6;
    --green: #2D6A4F;
    --red: #8B1A1A;
    --bg: #0e0d07;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 15% 5%, rgba(212,160,23,0.08) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 95%, rgba(139,26,26,0.08) 0%, transparent 45%);
    min-height:100vh;
    font-family:'Lato',sans-serif;
    color:var(--cream);
    display:flex; flex-direction:column; align-items:center;
    padding:12px 10px 36px;
    overflow-x:hidden;
  }

  .kente {
    width:100%; max-width:520px; height:6px; border-radius:3px;
    background: repeating-linear-gradient(90deg,
      #D4A017 0,#D4A017 15px, #8B1A1A 15px,#8B1A1A 30px,
      #2D6A4F 30px,#2D6A4F 45px, #0e0d07 45px,#0e0d07 60px);
    margin-bottom:10px;
  }

  h1 {
    font-family:'Playfair Display',serif;
    font-size:clamp(1.3rem,4.5vw,2rem); font-weight:900;
    color:var(--gold); letter-spacing:1px; text-align:center; line-height:1.1;
  }
  h1 span {
    display:block; color:rgba(245,237,214,0.42); font-size:0.42em;
    font-weight:300; letter-spacing:5px; text-transform:uppercase; margin-top:2px;
  }

  /* Stats */
  .score-row { display:flex; gap:10px; margin:8px 0; justify-content:center; }
  .stat {
    background:rgba(212,160,23,0.07); border:1px solid rgba(212,160,23,0.18);
    border-radius:8px; padding:4px 12px; text-align:center; min-width:66px;
  }
  .stat-num { font-family:'Playfair Display',serif; font-size:1.15rem; color:var(--gold); font-weight:700; }
  .stat-label { font-size:0.56rem; letter-spacing:2px; text-transform:uppercase; color:rgba(245,237,214,0.32); }

  /* Dots */
  .puzzle-dots { display:flex; gap:5px; justify-content:center; margin:3px 0 6px; }
  .pdot {
    width:7px; height:7px; border-radius:50%;
    background:rgba(212,160,23,0.15); border:1px solid rgba(212,160,23,0.3);
    transition:all 0.3s;
  }
  .pdot.done { background:var(--gold); }
  .pdot.active { background:var(--orange); transform:scale(1.4); }

  /* Theme / clue */
  #theme-label {
    font-size:0.6rem; letter-spacing:3px; text-transform:uppercase;
    color:rgba(245,237,214,0.32); text-align:center; margin-bottom:4px;
  }

  /* CLUE BOX */
  #clue-box {
    width:100%; max-width:520px;
    background:rgba(255,255,255,0.03);
    border-left:3px solid var(--gold);
    border-radius:0 8px 8px 0;
    padding:8px 14px;
    margin-bottom:8px;
    min-height:46px;
    transition:all 0.35s;
  }
  #clue-box .clue-tag {
    font-size:0.58rem; letter-spacing:2.5px; text-transform:uppercase;
    color:var(--gold); display:block; margin-bottom:2px;
  }
  #clue-box .clue-text {
    font-size:0.82rem; line-height:1.5; color:var(--cream);
  }
  #clue-box.hidden { opacity:0; pointer-events:none; }

  /* Word slots */
  #words-grid {
    width:100%; max-width:520px;
    display:flex; flex-direction:column; gap:5px;
    margin:4px 0 5px;
  }
  .word-row { display:flex; gap:4px; align-items:center; flex-wrap:wrap; }
  .letter-slot {
    width:29px; height:29px;
    background:rgba(255,255,255,0.05);
    border:1.5px solid rgba(245,237,214,0.12);
    border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Playfair Display',serif; font-size:0.9rem; font-weight:700;
    color:var(--cream); transition:all 0.25s;
  }
  .letter-slot.solved {
    background:rgba(232,118,10,0.2); border-color:var(--orange); color:var(--orange);
    animation:slot-fill 0.3s ease;
  }
  @keyframes slot-fill {
    0%{transform:scale(0.5);opacity:0} 60%{transform:scale(1.18)} 100%{transform:scale(1);opacity:1}
  }

  /* First slot is tappable for clue hint */
  .letter-slot.hint-tap {
    cursor: pointer;
    border-color: rgba(212,160,23,0.55);
    background: rgba(212,160,23,0.1);
    position: relative;
  }
  .letter-slot.hint-tap::after {
    content: '?';
    font-family: 'Lato', sans-serif;
    font-size: 0.65rem;
    font-weight: 900;
    color: var(--gold);
    opacity: 0.85;
  }
  .letter-slot.hint-tap:hover, .letter-slot.hint-tap:active {
    background: rgba(212,160,23,0.22);
    border-color: var(--gold);
    transform: scale(1.12);
  }
  .letter-slot.hint-tap.peeked {
    border-color: var(--gold);
    background: rgba(212,160,23,0.18);
    box-shadow: 0 0 8px rgba(212,160,23,0.3);
  }

  /* Clue box pulse when a hint is tapped */
  @keyframes clue-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(212,160,23,0.5); }
    60%  { box-shadow: 0 0 0 8px rgba(212,160,23,0); }
    100% { box-shadow: none; }
  }
  #clue-box.pulse { animation: clue-pulse 0.6s ease; }

  /* Small "tap ? for hint" label */
  .hint-label {
    font-size: 0.56rem; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(212,160,23,0.4); text-align: right;
    width: 100%; max-width: 520px; margin-bottom: 2px;
  }

  /* Current word */
  #current-word {
    font-family:'Playfair Display',serif; font-size:1.45rem;
    letter-spacing:5px; color:var(--light-gold);
    min-height:36px; text-align:center; margin:3px 0 0;
  }

  /* Message */
  #message {
    height:22px; text-align:center; font-size:0.8rem;
    font-weight:700; letter-spacing:1px; margin:2px 0;
    transition:all 0.25s;
  }
  .msg-ok  { color:#6fcf97; }
  .msg-err { color:#eb5757; }
  .msg-info{ color:var(--gold); }

  /* ===== WHEEL ===== */
  #wheel-wrap {
    position:relative; width:290px; height:290px;
    margin:4px auto 6px; flex-shrink:0;
    touch-action:none;
  }
  .wheel-ring {
    position:absolute; top:8px; left:8px; width:274px; height:274px;
    border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,0.05) 0%,rgba(255,255,255,0.01) 60%,transparent 100%);
    border:1.5px solid rgba(212,160,23,0.16);
    box-shadow:0 0 40px rgba(212,160,23,0.06),inset 0 0 28px rgba(0,0,0,0.45);
    pointer-events:none;
  }
  #wheel-canvas {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:2;
  }
  .letter-node {
    position:absolute; width:50px; height:50px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Playfair Display',serif; font-size:1.25rem; font-weight:700;
    cursor:pointer; user-select:none; touch-action:none; z-index:10;
    background:linear-gradient(145deg,#2e2207,#1c1504);
    border:2px solid rgba(212,160,23,0.38); color:var(--cream);
    box-shadow:0 4px 10px rgba(0,0,0,0.55);
    transition:background 0.1s, border-color 0.1s, box-shadow 0.1s;
  }
  .letter-node.active {
    background:linear-gradient(145deg,var(--orange),#b05200);
    border-color:var(--light-gold); color:#fff;
    box-shadow:0 0 16px rgba(232,118,10,0.65),0 4px 10px rgba(0,0,0,0.4);
  }

  /* Controls */
  .controls { display:flex; gap:10px; justify-content:center; margin-top:5px; }
  .btn {
    padding:9px 18px; border-radius:8px; border:none; cursor:pointer;
    font-family:'Lato',sans-serif; font-weight:700; font-size:0.72rem;
    letter-spacing:1.5px; text-transform:uppercase; transition:all 0.18s;
  }
  .btn-submit { background:linear-gradient(135deg,var(--orange),#a04500); color:#fff; box-shadow:0 3px 10px rgba(232,118,10,0.28); }
  .btn-submit:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(232,118,10,0.45); }
  .btn-clear { background:transparent; color:var(--cream); border:1.5px solid rgba(245,237,214,0.18); }
  .btn-clear:hover { border-color:var(--cream); background:rgba(255,255,255,0.04); }
  .btn-next { background:linear-gradient(135deg,var(--gold),#8a6000); color:#0e0d07; font-weight:900; }
  .btn-next:hover { transform:translateY(-2px); }

  /* Celebration */
  #celebration {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9);
    z-index:200; align-items:center; justify-content:center;
    flex-direction:column; text-align:center; padding:28px;
  }
  #celebration.show { display:flex; }
  #celebration h2 { font-family:'Playfair Display',serif; font-size:clamp(1.8rem,5vw,3rem); color:var(--gold); margin-bottom:10px; }
  #celebration p { color:var(--cream); font-size:0.92rem; max-width:380px; line-height:1.75; margin-bottom:18px; }
  .final-score { font-family:'Playfair Display',serif; font-size:1.25rem; color:var(--light-gold); margin-bottom:22px; }
</style>
</head>
<body>

<div class="kente"></div>
<h1>Word Connect<span>Black History Edition</span></h1>

<div class="score-row">
  <div class="stat"><div class="stat-num" id="score-el">0</div><div class="stat-label">Score</div></div>
  <div class="stat"><div class="stat-num" id="puzzle-el">1/8</div><div class="stat-label">Puzzle</div></div>
  <div class="stat"><div class="stat-num" id="found-el">0</div><div class="stat-label">Found</div></div>
</div>

<div class="puzzle-dots" id="dots"></div>
<div id="theme-label"></div>

<div id="clue-box">
  <span class="clue-tag">Clue</span>
  <span class="clue-text" id="clue-text">Connect letters to form words!</span>
</div>

<div class="hint-label">tap <span style="color:var(--gold)">?</span> on first square for a clue</div>
<div id="words-grid"></div>
<div id="current-word">—</div>
<div id="message"></div>

<div id="wheel-wrap">
  <div class="wheel-ring"></div>
  <canvas id="wheel-canvas" width="290" height="290"></canvas>
</div>

<div class="controls">
  <button class="btn btn-submit" id="submit-btn" onclick="handleSubmit()">Submit</button>
  <button class="btn btn-clear" onclick="clearSel()">Clear</button>
  <button class="btn btn-next" id="next-btn" style="display:none" onclick="nextPuzzle()">Next Puzzle →</button>
</div>

<div id="celebration">
  <div style="font-size:3rem;margin-bottom:10px">✊🏿</div>
  <h2>Outstanding!</h2>
  <p id="celeb-msg"></p>
  <div class="final-score" id="final-score-el"></div>
  <button class="btn btn-submit" onclick="restartGame()">Play Again</button>
</div>

<script>
// =====================================================
// PUZZLE DATA — letters verified to contain ALL letters
// needed for every word in that puzzle
// =====================================================
const PUZZLES = [
  {
    theme: "Harriet Tubman",
    // HARRIET needs H,A,R,R,I,E,T  — two R's required
    letters: ["H","A","R","R","I","E","T","U"],
    words: {
      HARRIET: "She was called the 'Moses of her people' — what was her first name?",
      HEART:   "She showed tremendous ___ leading over 70 people to freedom via the Underground Railroad.",
      IRATE:   "Enslavers were ___ (furious) that she kept escaping their grasp.",
      HAIR:    "She often disguised herself, hiding her ___ under hats and scarves.",
      HIRE:    "After freedom, people would ___ her as a spy and scout for the Union Army.",
      HEIR:    "She is considered the ___ to a long tradition of resistance against slavery.",
      TIER:    "She rose to the highest ___ of American heroism and courage.",
      RATE:    "She moved at an incredible ___ — rescuing people in the dead of night."
    }
  },
  {
    theme: "Rosa Parks",
    // Need R,O,S,A,P,K,C,I for ROSA PARK SOAR CORK ROCK PAIR SICK ORCA
    letters: ["R","O","S","A","P","K","C","I"],
    words: {
      ROSA:  "Her first name — on December 1st, 1955, she refused to give up her bus seat.",
      PARK:  "Her last name — she sparked a movement by staying seated in the ___ of history.",
      SOAR:  "Her courageous act caused the Civil Rights Movement to ___ to new heights.",
      ROCK:  "Her defiance was solid as a ___ — she would not be moved.",
      PAIR:  "She and Dr. King were a powerful ___ — both dedicated to equality.",
      CORK:  "Her arrest could not ___ up the flood of change she inspired.",
      SICK:  "She later said she was not tired physically — she was ___ of giving in.",
      ORCA:  "Like the powerful ocean mammal, she was a ___ — fierce and unstoppable."
    }
  },
  {
    theme: "Martin Luther King Jr.",
    // MARTIN needs M,A,R,T,I,N — all present; KING=K,I,N,G — all present
    letters: ["M","A","R","T","I","N","K","G"],
    words: {
      MARTIN: "His first name — the Reverend ___ Luther King Jr.",
      KING:   "His last name — he was a ___ of the Civil Rights Movement.",
      TRAIN:  "He helped ___ a generation of peaceful protesters through nonviolent resistance.",
      GRANT:  "His legacy will ___ future generations the courage to fight for justice.",
      TRIM:   "He could ___ his powerful speeches to speak to any audience, young or old.",
      GRAM:   "Every ___ of his effort went toward building a more just and equal America.",
      MINT:   "His words were as crisp and fresh as a ___ — timeless and powerful.",
      RANK:   "He rose to the highest ___ of American moral leadership."
    }
  },
  {
    theme: "Frederick Douglass",
    // FRED=F,R,E,D  GLAD=G,L,A,D  FLAG=F,L,A,G  all use F,R,E,D,L,A,S,G
    letters: ["F","R","E","D","L","A","S","G"],
    words: {
      FRED:  "Short for Frederick — his first name after he escaped slavery and renamed himself.",
      GLAD:  "He was ___ to use his powerful voice as a free man and abolitionist.",
      READ:  "Though it was illegal to teach enslaved people, he taught himself to ___ — and it changed everything.",
      FLAG:  "He challenged America to live up to its own ___ and the ideals it claimed to represent.",
      FLED:  "In 1838 he ___ slavery by disguising himself as a sailor and boarding a train north.",
      GALE:  "His speeches hit audiences like a ___ — a force of nature impossible to ignore.",
      DEAR:  "He held freedom ___ above all else, risking his life to achieve it.",
      LARD:  "As a boy he traded bread for reading lessons — even scraps of food were ___ compared to knowledge."
    }
  },
  {
    theme: "Maya Angelou",
    // Letters: M,A,Y,E,L,O,N,G — YELL removed (needs 2 L's), replaced with MANGO
    letters: ["M","A","Y","E","L","O","N","G"],
    words: {
      ANGEL: "She was named Maya ___ — her poetry was heavenly and transformative.",
      MOAN:  "Her writing gave voice to generations who could only ___ under oppression.",
      LONG:  "She spent her whole life fighting for justice — a ___ and courageous journey.",
      MEAN:  "Her memoir showed what it truly ___ s to rise above trauma and hatred.",
      LANE:  "She carved her own ___ as poet, memoirist, actress, and civil rights activist.",
      MANGO: "Growing up in the South, she loved the richness of her culture — sweet as a ___.",
      AMONG: "She stood ___ the greatest American writers of the 20th century.",
      MELON: "Her childhood in Stamps, Arkansas was rich with Southern tradition — sweet as a ___."
    }
  },
  {
    theme: "Barack Obama",
    // BRACE=B,R,A,C,E  COBRA=C,O,B,R,A  BROKE=B,R,O,K,E  CREAM=C,R,E,A,M
    // MAKER=M,A,K,E,R  ROBE=R,O,B,E  MARK=M,A,R,K  COKE=C,O,K,E
    // Letters needed: B,R,A,C,E,O,K,M — all present
    letters: ["B","R","A","C","K","O","M","E"],
    words: {
      BRACE:  "America needed to ___ for change — and in 2008, Barack Obama made history.",
      COBRA:  "Like the commanding ___,  he struck with precision in every debate and speech.",
      BROKE:  "He ___ barriers as the first African American President of the United States.",
      CREAM:  "He rose to the ___ of American politics through brilliance, grace, and determination.",
      MAKER:  "As a law professor and community ___, he fought for ordinary people long before the presidency.",
      ROBE:   "On Inauguration Day, the nation watched him ___ himself in the legacy of a long struggle.",
      MARK:   "He left an indelible ___ on history as the 44th and first Black U.S. President.",
      COKE:   "Growing up in Hawaii and Indonesia, he loved the simple joys of childhood — a cold ___."
    }
  },
  {
    theme: "Thurgood Marshall",
    // THUG=T,H,U,G  DRUM=D,R,U,M  TOUR=T,O,U,R  HOUR=H,O,U,R
    // GOTH=G,O,T,H  MOTH=M,O,T,H  DRUG=D,R,U,G  DORM=D,O,R,M
    // Letters: T,H,U,R,G,O,D,M — all verified ✅
    letters: ["T","H","U","R","G","O","D","M"],
    words: {
      THUG:  "Segregationists called civil rights lawyers troublemakers — but history proved them ___ wrong.",
      DRUM:  "He beat the ___ for equality in courtrooms across America for decades.",
      TOUR:  "He went on a nationwide ___ arguing civil rights cases — winning 29 of 32 before the Supreme Court.",
      HOUR:  "Brown v. Board of Education in 1954 was his finest ___ — ending school segregation.",
      GOTH:  "His opponents used every dark, ___ tactic to stop him — and failed.",
      MOTH:  "Like a ___ drawn to light, he was irresistibly drawn to the cause of justice.",
      DRUG:  "Discrimination was a ___ that poisoned American society — and he fought to cure it.",
      DORM:  "He was denied entry to the University of Maryland Law School ___ because of his race — then sued them and won."
    }
  },
  {
    theme: "Muhammad Ali",
    // MAIL=M,A,I,L  BAIL=B,A,I,L  LAMB=L,A,M,B  HAIL=H,A,I,L
    // MALE=M,A,L,E  HEAL=H,E,A,L  BEAM=B,E,A,M  MILE=M,I,L,E
    // Letters: M,U,H,A,L,I,B,E — all verified ✅
    letters: ["M","U","H","A","L","I","B","E"],
    words: {
      MAIL:  "After refusing the Vietnam draft, he received hate ___ — but also millions of letters of support.",
      BAIL:  "When arrested for refusing the draft, supporters rushed to post ___ for the heavyweight champion.",
      LAMB:  "Gentle as a ___ outside the ring, he was a lion inside it — a study in contrasts.",
      HAIL:  "The world would ___ him as 'The Greatest' — a title he gave himself and then proved.",
      MALE:  "He redefined what it meant to be a Black ___ in America — proud, outspoken, and unafraid.",
      HEAL:  "His boxing career was stripped away, but time helped ___ that injustice — and restore his legacy.",
      BEAM:  "He would ___ with pride after each victory, floating like a butterfly, stinging like a bee.",
      MILE:  "He went the extra ___ — not just as a boxer but as an activist, poet, and humanitarian."
    }
  }
];

// =====================================================
// GAME STATE
// =====================================================
const CX = 145, CY = 145, RADIUS = 102;

let G = {
  pIdx:0, score:0,
  foundAll: new Set(),
  foundThis: [],
  sel: [],
  dragging: false,
  puzzle: null,
  nodeEls: []
};

function nodePos(i, total) {
  const a = (2 * Math.PI * i / total) - Math.PI / 2;
  return { x: CX + RADIUS * Math.cos(a), y: CY + RADIUS * Math.sin(a) };
}

// =====================================================
// INIT
// =====================================================
function initPuzzle() {
  G.puzzle = PUZZLES[G.pIdx];
  G.foundThis = [];
  G.sel = [];
  G.dragging = false;

  document.getElementById('puzzle-el').textContent = `${G.pIdx+1}/8`;
  document.getElementById('found-el').textContent = 0;
  document.getElementById('theme-label').textContent = G.puzzle.theme;
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('submit-btn').style.display = '';
  setMsg('','');
  showClue('');
  buildDots();
  buildSlots();
  buildWheel();
  renderCurrentWord();
}

function buildDots() {
  document.getElementById('dots').innerHTML =
    PUZZLES.map((_,i) =>
      `<div class="pdot${i<G.pIdx?' done':i===G.pIdx?' active':''}"></div>`
    ).join('');
}

function buildSlots() {
  const grid = document.getElementById('words-grid');
  grid.innerHTML = '';
  Object.keys(G.puzzle.words).slice(0,6).forEach(word => {
    const row = document.createElement('div');
    row.className = 'word-row';
    row.id = 'row-'+word;
    word.split('').forEach((_,i) => {
      const s = document.createElement('div');
      s.id = `sl-${word}-${i}`;
      if (i === 0) {
        // First slot is tappable to reveal clue
        s.className = 'letter-slot hint-tap';
        s.title = 'Tap for a clue';
        s.addEventListener('click', () => tapHint(word, s));
        s.addEventListener('touchend', e => { e.preventDefault(); tapHint(word, s); });
      } else {
        s.className = 'letter-slot';
      }
      row.appendChild(s);
    });
    grid.appendChild(row);
  });
}

function tapHint(word, slotEl) {
  // Don't show hint if already solved
  if (slotEl.classList.contains('solved')) return;
  slotEl.classList.add('peeked');
  showClue(word, true);
  setMsg('💡 Clue revealed! (-5 pts)', 'msg-info');
  // Small score penalty for using a hint
  G.score = Math.max(0, G.score - 5);
  document.getElementById('score-el').textContent = G.score;
}

// =====================================================
// WHEEL
// =====================================================
function buildWheel() {
  const wrap = document.getElementById('wheel-wrap');
  // Remove old nodes
  G.nodeEls.forEach(n => n.remove());
  G.nodeEls = [];

  const letters = G.puzzle.letters;
  letters.forEach((ch, i) => {
    const pos = nodePos(i, letters.length);
    const el = document.createElement('div');
    el.className = 'letter-node';
    el.textContent = ch;
    el.dataset.idx = i;
    el.style.cssText = `left:${pos.x}px;top:${pos.y}px;transform:translate(-50%,-50%)`;
    wrap.appendChild(el);
    G.nodeEls.push(el);
  });

  drawLines();

  // ---- Event Handling ----
  // Use the wrap for all events
  wrap.onmousedown = e => {
    const node = e.target.closest('.letter-node');
    if (!node) return;
    e.preventDefault();
    G.dragging = true;
    G.sel = [parseInt(node.dataset.idx)];
    refresh();
  };

  wrap.onmouseover = e => {
    if (!G.dragging) return;
    const node = e.target.closest('.letter-node');
    if (!node) return;
    tryAdd(parseInt(node.dataset.idx));
  };

  // Touch
  wrap.ontouchstart = e => {
    e.preventDefault();
    const t = e.touches[0];
    const node = nodeAtPoint(t.clientX, t.clientY);
    if (!node) return;
    G.dragging = true;
    G.sel = [parseInt(node.dataset.idx)];
    refresh();
  };

  wrap.ontouchmove = e => {
    e.preventDefault();
    if (!G.dragging) return;
    const t = e.touches[0];
    const node = nodeAtPoint(t.clientX, t.clientY);
    if (node) tryAdd(parseInt(node.dataset.idx));
  };

  wrap.ontouchend = e => {
    e.preventDefault();
    if (G.dragging && G.sel.length >= 2) handleSubmit();
    else clearSel();
  };
}

// Global mouseup
document.addEventListener('mouseup', () => {
  if (!G.dragging) return;
  if (G.sel.length >= 2) handleSubmit();
  else clearSel();
});

function nodeAtPoint(cx, cy) {
  for (const el of G.nodeEls) {
    const r = el.getBoundingClientRect();
    if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) return el;
  }
  return null;
}

function tryAdd(idx) {
  // Backtrack support
  if (G.sel.length >= 2 && G.sel[G.sel.length-2] === idx) {
    G.sel.pop(); refresh(); return;
  }
  if (G.sel.includes(idx)) return;
  G.sel.push(idx);
  refresh();
}

function refresh() {
  G.nodeEls.forEach((el,i) => el.classList.toggle('active', G.sel.includes(i)));
  renderCurrentWord();
  drawLines();
}

function renderCurrentWord() {
  const w = G.sel.map(i => G.puzzle.letters[i]).join('');
  document.getElementById('current-word').textContent = w || '—';
}

// =====================================================
// CANVAS LINES
// =====================================================
function drawLines() {
  const canvas = document.getElementById('wheel-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,290,290);
  if (G.sel.length < 2) return;

  const n = G.puzzle.letters.length;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = 'rgba(232,118,10,0.88)';
  ctx.shadowColor = 'rgba(232,118,10,0.45)';
  ctx.shadowBlur = 14;
  ctx.beginPath();
  G.sel.forEach((idx,i) => {
    const p = nodePos(idx, n);
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  });
  ctx.stroke();
  ctx.shadowBlur = 0;

  G.sel.forEach((idx,i) => {
    const p = nodePos(idx, n);
    ctx.beginPath();
    ctx.arc(p.x, p.y, i===0 ? 10 : 7, 0, Math.PI*2);
    ctx.fillStyle = i===0 ? 'rgba(240,192,64,0.9)' : 'rgba(232,118,10,0.75)';
    ctx.fill();
  });
}

// =====================================================
// CLUE
// =====================================================
function showClue(word, isHint) {
  const box = document.getElementById('clue-box');
  const tag = box.querySelector('.clue-tag');
  const txt = document.getElementById('clue-text');
  if (!word) {
    tag.textContent = 'How to Play';
    txt.textContent = 'Swipe letters to form words. Tap the ? on the first square of any row for a clue!';
    box.classList.remove('hidden');
    return;
  }
  const clue = G.puzzle.words[word];
  if (clue) {
    tag.textContent = isHint ? '💡 Clue' : '✓ ' + word;
    txt.textContent = clue;
    box.classList.remove('hidden');
    box.classList.remove('pulse');
    void box.offsetWidth;
    box.classList.add('pulse');
    box.style.borderLeftColor = isHint ? 'var(--gold)' : '#6fcf97';
    setTimeout(() => { box.style.borderLeftColor = 'var(--gold)'; }, 1400);
  }
}

// =====================================================
// SUBMIT
// =====================================================
function handleSubmit() {
  G.dragging = false;
  const word = G.sel.map(i => G.puzzle.letters[i]).join('');

  if (word.length < 2) { clearSel(); return; }

  if (G.foundAll.has(word)) {
    setMsg('Already found!','msg-info'); clearSel(); return;
  }

  const wordList = Object.keys(G.puzzle.words);
  if (wordList.includes(word)) {
    G.foundAll.add(word);
    G.foundThis.push(word);
    const pts = word.length * 10;
    G.score += pts;
    document.getElementById('score-el').textContent = G.score;
    document.getElementById('found-el').textContent = G.foundThis.length;
    setMsg(`✓ ${word}! +${pts} pts`, 'msg-ok');
    fillSlots(word);
    showClue(word, false);  // Show history clue on solve

    // Win check — first 6 target words
    const targets = wordList.slice(0, 6);
    if (targets.every(w => G.foundAll.has(w))) {
      G.score += 50;
      document.getElementById('score-el').textContent = G.score;
      setTimeout(() => {
        setMsg('🎉 Puzzle Complete! +50 bonus', 'msg-ok');
        if (G.pIdx >= PUZZLES.length - 1) setTimeout(showCelebration, 1200);
        else {
          document.getElementById('next-btn').style.display = '';
          document.getElementById('submit-btn').style.display = 'none';
        }
      }, 600);
    }
  } else {
    setMsg(`"${word}" — keep trying!`, 'msg-err');
  }

  clearSel();
}

function fillSlots(word) {
  word.split('').forEach((ch, i) => {
    const s = document.getElementById(`sl-${word}-${i}`);
    if (s) {
      s.textContent = ch;
      s.classList.remove('hint-tap','peeked');
      s.classList.add('solved');
      // Remove tap listener by replacing with clone
      const clone = s.cloneNode(true);
      s.parentNode.replaceChild(clone, s);
    }
  });
}

function clearSel() {
  G.sel = []; G.dragging = false; refresh();
}

// =====================================================
// NAV
// =====================================================
function nextPuzzle() {
  if (G.pIdx < PUZZLES.length - 1) { G.pIdx++; initPuzzle(); }
}

function showCelebration() {
  document.getElementById('celeb-msg').textContent =
    `You completed all 8 puzzles honoring the giants of Black history — from Harriet Tubman to Muhammad Ali. Their courage, sacrifice, and brilliance changed the world forever.`;
  document.getElementById('final-score-el').textContent = `Final Score: ${G.score} pts`;
  document.getElementById('celebration').classList.add('show');
}

function restartGame() {
  G = { pIdx:0, score:0, foundAll:new Set(), foundThis:[], sel:[], dragging:false, puzzle:null, nodeEls:[] };
  document.getElementById('celebration').classList.remove('show');
  initPuzzle();
}

function setMsg(msg, cls) {
  const el = document.getElementById('message');
  el.textContent = msg; el.className = cls;
  if (msg) setTimeout(() => { if(el.textContent===msg){el.textContent='';el.className='';} }, 2800);
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key==='Escape') clearSel();
  if (e.key==='Enter') handleSubmit();
});

// =====================================================
initPuzzle();
</script>
</body>
</html>
