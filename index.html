<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black History Word Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4A017;
    --deep-red: #8B1A1A;
    --black: #0A0A0A;
    --cream: #F5EDD6;
    --green: #2D6A4F;
    --light-gold: #F0C040;
    --bg: #111008;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(212,160,23,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(139,26,26,0.1) 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'Lato', sans-serif;
    color: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 10px 40px;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
  }

  .kente-bar {
    width: 100%;
    max-width: 560px;
    height: 8px;
    background: repeating-linear-gradient(90deg,
      #D4A017 0px, #D4A017 20px,
      #8B1A1A 20px, #8B1A1A 40px,
      #2D6A4F 40px, #2D6A4F 60px,
      #0A0A0A 60px, #0A0A0A 80px
    );
    border-radius: 4px;
    margin: 0 auto 16px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 2px;
    text-shadow: 0 2px 12px rgba(212,160,23,0.3);
    line-height: 1.1;
  }

  h1 span {
    display: block;
    color: var(--cream);
    font-size: 0.45em;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .score-row {
    display: flex;
    gap: 20px;
    margin: 8px 0 18px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .stat {
    background: rgba(212,160,23,0.08);
    border: 1px solid rgba(212,160,23,0.25);
    border-radius: 8px;
    padding: 8px 18px;
    text-align: center;
    min-width: 90px;
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--gold);
    font-weight: 700;
  }

  .stat-label {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(245,237,214,0.5);
  }

  #clue-box {
    background: rgba(255,255,255,0.04);
    border-left: 3px solid var(--gold);
    border-radius: 0 8px 8px 0;
    padding: 10px 18px;
    margin-bottom: 16px;
    max-width: 540px;
    width: 100%;
    font-size: 0.85rem;
    line-height: 1.5;
    color: var(--cream);
    min-height: 48px;
    transition: all 0.3s;
  }

  #clue-box strong {
    color: var(--gold);
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 3px;
  }

  #word-display {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
    min-height: 52px;
    max-width: 540px;
    width: 100%;
  }

  .word-blank {
    width: 38px;
    height: 44px;
    border-bottom: 2.5px solid var(--gold);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 4px;
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--light-gold);
    transition: all 0.2s;
    position: relative;
  }

  .word-blank.filled {
    animation: pop-in 0.15s ease;
  }

  @keyframes pop-in {
    0% { transform: scale(0.7); opacity: 0.5; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  .word-blank.wrong {
    border-color: var(--deep-red);
    animation: shake 0.35s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .selected-display {
    min-height: 40px;
    margin-bottom: 14px;
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--light-gold);
    letter-spacing: 4px;
    text-align: center;
    padding: 6px 12px;
    background: rgba(212,160,23,0.06);
    border-radius: 8px;
    max-width: 540px;
    width: 100%;
  }

  .letter-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    max-width: 320px;
    width: 100%;
    margin-bottom: 18px;
  }

  .letter-btn {
    aspect-ratio: 1;
    background: linear-gradient(145deg, #1e1a0e, #2a2410);
    border: 1.5px solid rgba(212,160,23,0.35);
    border-radius: 10px;
    color: var(--cream);
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    box-shadow: 0 3px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
  }

  .letter-btn:hover:not(:disabled) {
    border-color: var(--gold);
    color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(212,160,23,0.2);
  }

  .letter-btn.selected {
    background: linear-gradient(145deg, #3d2e05, #5a4510);
    border-color: var(--gold);
    color: var(--gold);
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 6px 20px rgba(212,160,23,0.3);
  }

  .letter-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
    transform: none;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .btn-submit {
    background: linear-gradient(135deg, #D4A017, #a07010);
    color: #0A0A0A;
    box-shadow: 0 4px 14px rgba(212,160,23,0.3);
  }

  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,160,23,0.45); }

  .btn-clear {
    background: transparent;
    color: var(--cream);
    border: 1.5px solid rgba(245,237,214,0.25);
  }

  .btn-clear:hover { border-color: var(--cream); background: rgba(255,255,255,0.05); }

  .btn-skip {
    background: transparent;
    color: rgba(245,237,214,0.4);
    border: 1.5px solid rgba(245,237,214,0.1);
    font-size: 0.7rem;
  }

  .btn-skip:hover { color: var(--cream); border-color: rgba(245,237,214,0.3); }

  #message-box {
    min-height: 36px;
    text-align: center;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 16px;
    transition: all 0.3s;
  }

  .msg-success { color: #6fcf97; }
  .msg-error { color: #eb5757; }
  .msg-info { color: var(--gold); }

  #progress-section {
    max-width: 540px;
    width: 100%;
  }

  .progress-title {
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(245,237,214,0.35);
    margin-bottom: 10px;
    text-align: center;
  }

  .words-found-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .found-word {
    background: rgba(45,106,79,0.2);
    border: 1px solid rgba(45,106,79,0.5);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 0.75rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #6fcf97;
    font-weight: 700;
    animation: slide-in 0.3s ease;
  }

  @keyframes slide-in {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .remaining-pill {
    background: rgba(139,26,26,0.15);
    border: 1px solid rgba(139,26,26,0.4);
    color: rgba(245,237,214,0.3);
  }

  #celebration {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 30px;
  }

  #celebration.show { display: flex; }

  #celebration h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--gold);
    margin-bottom: 12px;
  }

  #celebration p {
    color: var(--cream);
    font-size: 1rem;
    margin-bottom: 24px;
    max-width: 400px;
    line-height: 1.6;
  }

  #celebration .final-score {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--light-gold);
    margin-bottom: 28px;
  }

  .puzzle-indicator {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 16px;
  }

  .puzzle-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(212,160,23,0.2);
    border: 1px solid rgba(212,160,23,0.4);
    transition: all 0.3s;
  }

  .puzzle-dot.done { background: var(--gold); }
  .puzzle-dot.active { background: var(--light-gold); transform: scale(1.3); }
</style>
</head>
<body>

<header>
  <div class="kente-bar"></div>
  <h1>Word Connect<span>Black History Edition</span></h1>
</header>

<div class="score-row">
  <div class="stat"><div class="stat-num" id="score-display">0</div><div class="stat-label">Score</div></div>
  <div class="stat"><div class="stat-num" id="puzzle-display">1</div><div class="stat-label">Puzzle</div></div>
  <div class="stat"><div class="stat-num" id="streak-display">0</div><div class="stat-label">Streak</div></div>
</div>

<div class="puzzle-indicator" id="puzzle-dots"></div>

<div id="clue-box"><strong>Clue</strong><span id="clue-text">Loading...</span></div>

<div id="word-display"></div>
<div class="selected-display" id="selected-display">—</div>

<div class="letter-grid" id="letter-grid"></div>

<div class="controls">
  <button class="btn btn-submit" onclick="submitWord()">Submit</button>
  <button class="btn btn-clear" onclick="clearSelection()">Clear</button>
  <button class="btn btn-skip" onclick="skipPuzzle()">Skip →</button>
</div>

<div id="message-box"></div>

<div id="progress-section">
  <div class="progress-title">Found This Round</div>
  <div class="words-found-grid" id="words-found"></div>
</div>

<div id="celebration">
  <div style="font-size:3rem;margin-bottom:12px;">✊🏿</div>
  <h2>Well Done!</h2>
  <p id="celeb-msg"></p>
  <div class="final-score" id="final-score-display"></div>
  <button class="btn btn-submit" onclick="restartGame()">Play Again</button>
</div>

<script>
const PUZZLES = [
  {
    words: ["HARRIET", "TUBMAN", "RAILROAD", "FREEDOM"],
    clues: {
      HARRIET: "First name of the 'Moses of her people' who led hundreds to freedom",
      TUBMAN: "She carried a pistol and vowed 'I never ran my train off the track'",
      RAILROAD: "Secret network of safe houses used to escape slavery (2 words: ___ ___)",
      FREEDOM: "What she risked everything to secure for herself and others"
    },
    theme: "Harriet Tubman & the Underground Railroad"
  },
  {
    words: ["ROSA", "PARKS", "BOYCOTT", "MONTGOMERY"],
    clues: {
      ROSA: "Her feet were 'tired, but her soul was rested' — first name",
      PARKS: "She refused to give up her seat — last name",
      BOYCOTT: "381-day protest against segregated buses in Alabama",
      MONTGOMERY: "Alabama city where a historic bus protest changed America"
    },
    theme: "Rosa Parks & the Montgomery Bus Boycott"
  },
  {
    words: ["MARTIN", "DREAM", "MARCH", "JUSTICE"],
    clues: {
      MARTIN: "First name of the King of the Civil Rights Movement",
      DREAM: "The famous vision he shared on the steps of the Lincoln Memorial",
      MARCH: "250,000 people did this on Washington in August 1963",
      JUSTICE: "MLK said this must be indivisible — justice anywhere is a threat to ___ everywhere"
    },
    theme: "Martin Luther King Jr."
  },
  {
    words: ["OBAMA", "SENATE", "HOPE", "CHANGE"],
    clues: {
      OBAMA: "44th President — first African American to hold the office",
      SENATE: "He represented Illinois in the U.S. ___ before the presidency",
      HOPE: "Key word in his 2004 DNC speech: 'The Audacity of ___'",
      CHANGE: "His 2008 campaign slogan: '___  We Can Believe In'"
    },
    theme: "Barack Obama"
  },
  {
    words: ["LANGSTON", "HARLEM", "BLUES", "POET"],
    clues: {
      LANGSTON: "First name of Hughes, voice of the Harlem Renaissance",
      HARLEM: "Manhattan neighborhood that became the Black cultural capital of the 1920s",
      BLUES: "Musical and emotional tradition woven throughout Hughes' poetry",
      POET: "Langston Hughes' most celebrated artistic role"
    },
    theme: "Langston Hughes & the Harlem Renaissance"
  },
  {
    words: ["MAYA", "ANGELOU", "CAGED", "VOICE"],
    clues: {
      MAYA: "Her first name — a legendary poet, memoirist, and activist",
      ANGELOU: "Her last name — she recited 'On the Pulse of Morning' at Clinton's inauguration",
      CAGED: "She wrote 'I Know Why the ___ Bird Sings'",
      VOICE: "Despite being mute for years as a child, she became famous for hers"
    },
    theme: "Maya Angelou"
  },
  {
    words: ["THURGOOD", "MARSHALL", "SUPREME", "EQUALITY"],
    clues: {
      THURGOOD: "First name of the first Black U.S. Supreme Court Justice",
      MARSHALL: "He argued Brown v. Board of Education — last name",
      SUPREME: "___ Court — the highest court he would later sit on",
      EQUALITY: "The legal principle he spent his career fighting for"
    },
    theme: "Thurgood Marshall"
  },
  {
    words: ["MUHAMMED", "ALI", "FLOAT", "CHAMPION"],
    clues: {
      MUHAMMED: "He changed his name to this after joining the Nation of Islam",
      ALI: "He said 'I am the greatest' — last name",
      FLOAT: "'___ like a butterfly, sting like a bee'",
      CHAMPION: "Three-time heavyweight boxing ___ of the world"
    },
    theme: "Muhammad Ali"
  }
];

// --- Game State ---
let state = {
  puzzleIndex: 0,
  score: 0,
  streak: 0,
  wordsFound: [],
  selectedLetters: [],
  selectedIndices: [],
  shuffledLetters: [],
  currentPuzzle: null,
  wrongAttempts: 0,
  currentWordIndex: 0,
  lives: 5
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initPuzzle() {
  const p = PUZZLES[state.puzzleIndex];
  state.currentPuzzle = p;
  state.wordsFound = [];
  state.currentWordIndex = 0;
  state.wrongAttempts = 0;
  loadCurrentWord();
  updatePuzzleDots();
  updateScoreDisplay();
  renderFoundWords();
  document.getElementById('message-box').textContent = '';
  document.getElementById('message-box').className = '';
}

function loadCurrentWord() {
  const p = state.currentPuzzle;
  if (state.currentWordIndex >= p.words.length) {
    // All words found in this puzzle
    completePuzzle();
    return;
  }
  const word = p.words[state.currentWordIndex];
  const clue = p.clues[word];

  document.getElementById('clue-text').textContent = clue;

  // Build letter pool: word letters + some distractors
  const distractors = 'BCDFGHJKLMNPQRSTVWXYZ'.split('').filter(c => !word.includes(c));
  const shuffledDistractors = shuffle(distractors);
  const needed = Math.max(0, 10 - word.length);
  const pool = shuffle([...word.split(''), ...shuffledDistractors.slice(0, needed)]);
  // Make sure max 10 letters shown
  state.shuffledLetters = pool.slice(0, 10);
  state.selectedLetters = [];
  state.selectedIndices = [];

  renderWordBlanks(word);
  renderLetterGrid();
  updateSelectedDisplay();
}

function renderWordBlanks(word) {
  const div = document.getElementById('word-display');
  div.innerHTML = '';
  for (let i = 0; i < word.length; i++) {
    const b = document.createElement('div');
    b.className = 'word-blank';
    b.id = `blank-${i}`;
    div.appendChild(b);
  }
}

function renderLetterGrid() {
  const grid = document.getElementById('letter-grid');
  grid.innerHTML = '';
  state.shuffledLetters.forEach((letter, idx) => {
    const btn = document.createElement('button');
    btn.className = 'letter-btn';
    btn.textContent = letter;
    btn.id = `lbtn-${idx}`;
    btn.onclick = () => selectLetter(idx, letter);
    grid.appendChild(btn);
  });
}

function selectLetter(idx, letter) {
  if (state.selectedIndices.includes(idx)) {
    // Deselect
    state.selectedIndices = state.selectedIndices.filter(i => i !== idx);
    state.selectedLetters = state.selectedLetters.filter((_, i) => {
      const pos = state.selectedIndices.indexOf(idx);
      return true; // re-filter below
    });
    // Rebuild properly
    state.selectedLetters = state.selectedIndices.map(i => state.shuffledLetters[i]);
    document.getElementById(`lbtn-${idx}`).classList.remove('selected');
  } else {
    const word = state.currentPuzzle.words[state.currentWordIndex];
    if (state.selectedLetters.length >= word.length) return;
    state.selectedIndices.push(idx);
    state.selectedLetters.push(letter);
    document.getElementById(`lbtn-${idx}`).classList.add('selected');
  }
  updateSelectedDisplay();
  updateWordBlanks();
}

function updateSelectedDisplay() {
  const d = document.getElementById('selected-display');
  if (state.selectedLetters.length === 0) {
    d.textContent = '—';
  } else {
    d.textContent = state.selectedLetters.join(' ');
  }
}

function updateWordBlanks() {
  const word = state.currentPuzzle.words[state.currentWordIndex];
  for (let i = 0; i < word.length; i++) {
    const b = document.getElementById(`blank-${i}`);
    if (!b) continue;
    if (state.selectedLetters[i]) {
      b.textContent = state.selectedLetters[i];
      b.classList.add('filled');
    } else {
      b.textContent = '';
      b.classList.remove('filled');
    }
  }
}

function submitWord() {
  const word = state.currentPuzzle.words[state.currentWordIndex];
  const attempt = state.selectedLetters.join('');

  if (attempt.length === 0) {
    showMessage('Select some letters first!', 'msg-info');
    return;
  }

  if (attempt === word) {
    // Correct!
    state.score += Math.max(10, 30 - state.wrongAttempts * 5);
    state.streak++;
    state.wordsFound.push(word);

    // Fill in the blanks green
    for (let i = 0; i < word.length; i++) {
      const b = document.getElementById(`blank-${i}`);
      if (b) b.style.borderColor = '#6fcf97';
    }

    updateScoreDisplay();
    showMessage(`✓ ${word}! +${Math.max(10, 30 - state.wrongAttempts * 5)} pts`, 'msg-success');
    renderFoundWords();

    setTimeout(() => {
      state.currentWordIndex++;
      state.wrongAttempts = 0;
      showMessage('', '');
      loadCurrentWord();
    }, 1000);

  } else {
    state.wrongAttempts++;
    state.streak = 0;
    updateScoreDisplay();
    showMessage(`✗ Not quite — try again! (${5 - state.wrongAttempts} hints left)`, 'msg-error');

    // Shake blanks
    document.querySelectorAll('.word-blank').forEach(b => {
      b.classList.add('wrong');
      setTimeout(() => b.classList.remove('wrong'), 400);
    });

    if (state.wrongAttempts >= 5) {
      showMessage(`The answer was: ${word}`, 'msg-info');
      setTimeout(() => {
        state.currentWordIndex++;
        state.wrongAttempts = 0;
        showMessage('', '');
        loadCurrentWord();
      }, 2000);
    }

    clearSelection();
  }
}

function clearSelection() {
  state.selectedLetters = [];
  state.selectedIndices.forEach(idx => {
    const btn = document.getElementById(`lbtn-${idx}`);
    if (btn) btn.classList.remove('selected');
  });
  state.selectedIndices = [];
  updateSelectedDisplay();
  updateWordBlanks();
}

function skipPuzzle() {
  state.puzzleIndex = (state.puzzleIndex + 1) % PUZZLES.length;
  initPuzzle();
}

function completePuzzle() {
  const bonus = 50;
  state.score += bonus;
  updateScoreDisplay();
  showMessage(`🎉 Puzzle Complete! +${bonus} bonus pts`, 'msg-success');

  if (state.puzzleIndex >= PUZZLES.length - 1) {
    // Game complete
    setTimeout(showCelebration, 1200);
  } else {
    setTimeout(() => {
      state.puzzleIndex++;
      initPuzzle();
    }, 2000);
  }
}

function showCelebration() {
  document.getElementById('celeb-msg').textContent =
    `You completed all ${PUZZLES.length} puzzles and honored the legacy of Black history's most powerful figures.`;
  document.getElementById('final-score-display').textContent = `Final Score: ${state.score} pts`;
  document.getElementById('celebration').classList.add('show');
}

function restartGame() {
  state = { puzzleIndex: 0, score: 0, streak: 0, wordsFound: [], selectedLetters: [], selectedIndices: [], shuffledLetters: [], currentPuzzle: null, wrongAttempts: 0, currentWordIndex: 0, lives: 5 };
  document.getElementById('celebration').classList.remove('show');
  initPuzzle();
}

function showMessage(msg, cls) {
  const el = document.getElementById('message-box');
  el.textContent = msg;
  el.className = cls;
}

function updateScoreDisplay() {
  document.getElementById('score-display').textContent = state.score;
  document.getElementById('puzzle-display').textContent = state.puzzleIndex + 1;
  document.getElementById('streak-display').textContent = state.streak;
}

function renderFoundWords() {
  const div = document.getElementById('words-found');
  div.innerHTML = '';
  const total = state.currentPuzzle.words.length;
  state.currentPuzzle.words.forEach(w => {
    const pill = document.createElement('div');
    if (state.wordsFound.includes(w)) {
      pill.className = 'found-word';
      pill.textContent = w;
    } else {
      pill.className = 'found-word remaining-pill';
      pill.textContent = '? '.repeat(w.length).trim();
    }
    div.appendChild(pill);
  });
}

function updatePuzzleDots() {
  const div = document.getElementById('puzzle-dots');
  div.innerHTML = '';
  PUZZLES.forEach((_, i) => {
    const dot = document.createElement('div');
    if (i < state.puzzleIndex) dot.className = 'puzzle-dot done';
    else if (i === state.puzzleIndex) dot.className = 'puzzle-dot active';
    else dot.className = 'puzzle-dot';
    div.appendChild(dot);
  });
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitWord();
  if (e.key === 'Escape' || e.key === 'Backspace') clearSelection();
});

// Start!
initPuzzle();
</script>
</body>
</html>
